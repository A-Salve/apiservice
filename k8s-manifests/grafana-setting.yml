grafana:
  image:
    tag: "11.6.16"

  grafana.ini:
    server:
      root_url: '%(protocol)s://%(domain)s/grafana/'
      serve_from_sub_path: true
    database:
      type: postgres
      host: grafana-pg-postgresql.monitoring.svc.cluster.local:5432
      name: grafana
      user: grafana

  envValueFrom:
    GF_DATABASE_PASSWORD:
      secretKeyRef:
        name: grafana-pg-postgresql
        key: password