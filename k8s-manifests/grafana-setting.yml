grafana:
  grafana.ini:
    server:
      root_url: '%(protocol)s://%(domain)s/grafana/'
      serve_from_sub_path: true
  livenessProbe:
    httpGet:
      path: /api/health
      port: 3000
    initialDelaySeconds: 60
    timeoutSeconds: 15
    periodSeconds: 10
    failureThreshold: 15
  readinessProbe:
    httpGet:
      path: /api/health
      port: 3000
    timeoutSeconds: 5
    periodSeconds: 10
    failureThreshold: 6